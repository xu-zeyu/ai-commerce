services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_HOME:-/opt/docker/nginx}/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_HOME:-/opt/docker/nginx}/conf/conf.d:/etc/nginx/conf.d:ro
      - ${NGINX_HOME:-/opt/docker/nginx}/certs:/etc/nginx/certs:ro
      - ${NGINX_HOME:-/opt/docker/nginx}/logs:/var/log/nginx
      - ${STATIC_WEB_HOME:-/opt/html/jinhan-shop-web-test}:/usr/share/nginx/html/jinhan-shop-web:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - edge
      - backend

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_APP_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_HOST_PORT:-33306}:3306"
    volumes:
      - ${MYSQL_HOME:-/opt/docker/mysql}/conf/jinhan.cnf:/etc/mysql/conf.d/jinhan.cnf:ro
      - ${MYSQL_DATA_HOME:-/data/docker/mysql}:/var/lib/mysql
      - ${MYSQL_LOG_HOME:-/opt/docker/mysql/logs}:/var/log/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server /usr/local/etc/redis/redis.conf --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - ${REDIS_HOME:-/opt/docker/redis}/conf/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ${REDIS_DATA_HOME:-/data/docker/redis}:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${RABBITMQ_AMQP_HOST_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - ${RABBITMQ_DATA_HOME:-/data/docker/rabbitmq}:/var/lib/rabbitmq
      - ${RABBITMQ_LOG_HOME:-/opt/docker/rabbitmq/logs}:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MINIO_DATA_HOME:-/data/docker/minio}:/data
    networks:
      - backend

  config-server:
    image: ${CONFIG_SERVER_IMAGE:-ai-commerce/config-server:test}
    container_name: config-server
    restart: unless-stopped
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: native
      CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/opt/ai-commerce/config-repo
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      JAVA_OPTS: ${CONFIG_SERVER_JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -Dfile.encoding=UTF-8}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${CONFIG_REPO_HOME:-/opt/jinhan/ai-commerce-test/config-repo}:/opt/ai-commerce/config-repo:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u \"$${CONFIG_SERVER_USERNAME}:$${CONFIG_SERVER_PASSWORD}\" http://localhost:8888/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  browser-mcp:
    image: ${BROWSER_MCP_IMAGE:-mcr.microsoft.com/playwright/mcp:latest}
    container_name: browser-mcp
    restart: unless-stopped
    init: true
    command:
      - --port
      - "8931"
      - --host
      - 0.0.0.0
      - --allowed-hosts
      - ${BROWSER_MCP_ALLOWED_HOSTS:-browser-mcp,localhost,127.0.0.1}
      - --isolated
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const socket=net.connect(8931,'127.0.0.1');socket.setTimeout(3000);socket.on('connect',()=>{socket.end();process.exit(0)});socket.on('error',()=>process.exit(1));socket.on('timeout',()=>process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    shm_size: 1gb
    networks:
      - backend

  admin-web:
    image: ${ADMIN_WEB_IMAGE:-ai-commerce/admin-web:test}
    container_name: jinhan-shop-admin-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
      browser-mcp:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: test
      SPRING_CLOUD_CONFIG_ENABLED: "true"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USERNAME}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      SPRING_CLOUD_CONFIG_PROFILE: ${SPRING_CLOUD_CONFIG_PROFILE:-test}
      SPRING_CLOUD_CONFIG_LABEL: ${SPRING_CLOUD_CONFIG_LABEL:-main}
      SPRING_CLOUD_CONFIG_FAIL_FAST: ${SPRING_CLOUD_CONFIG_FAIL_FAST:-true}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-jinhan_shop}
      DB_URL: "${DB_URL:-jdbc:mysql://mysql:3306/jinhan_shop?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER_CLASS_NAME: ${DB_DRIVER_CLASS_NAME:-com.mysql.cj.jdbc.Driver}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      AI_CHAT_BROWSER_MCP_ENABLED: ${AI_CHAT_BROWSER_MCP_ENABLED:-true}
      AI_CHAT_BROWSER_MCP_ENDPOINT: ${AI_CHAT_BROWSER_MCP_ENDPOINT:-http://browser-mcp:8931/mcp}
      AI_CHAT_BROWSER_MCP_BEARER_TOKEN: ${AI_CHAT_BROWSER_MCP_BEARER_TOKEN:-}
      AI_CHAT_BROWSER_MCP_TIMEOUT_MILLIS: ${AI_CHAT_BROWSER_MCP_TIMEOUT_MILLIS:-60000}
      AI_CHAT_BROWSER_MCP_MAX_TOOL_ROUND_TRIPS: ${AI_CHAT_BROWSER_MCP_MAX_TOOL_ROUND_TRIPS:-12}
      JAVA_OPTS: ${ADMIN_WEB_JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -Dfile.encoding=UTF-8}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${ADMIN_WEB_HOST_PORT:-8081}:8081"
    volumes:
      - ${ADMIN_WEB_CONFIG_HOME:-/opt/jinhan/ai-commerce-test/admin-web/config}:/app/config:ro
      - ${ADMIN_WEB_DATA_HOME:-/data/jinhan/ai-commerce-test/admin-web}:/app/data
      - ${ADMIN_WEB_LOG_HOME:-/var/log/jinhan/ai-commerce-test/admin-web}:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    shm_size: 1gb
    networks:
      - backend

networks:
  edge:
    name: jinhan-commerce-test-edge
    driver: bridge
  backend:
    name: jinhan-commerce-test-backend
    driver: bridge
