services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ai-commerce-nginx
    restart: unless-stopped
    depends_on:
      admin-web:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - edge
      - backend

  mysql:
    image: mysql:8.0
    container_name: ai-commerce-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_APP_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: ai-commerce-redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ai-commerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend

  config-server:
    build:
      context: ../..
      dockerfile: docker/app/Dockerfile.runtime
      args:
        APP_JAR_FILE: docker/app/dist/config-server.jar
    image: ${CONFIG_SERVER_IMAGE:-ai-commerce/config-server:prod}
    container_name: ai-commerce-config-server
    restart: unless-stopped
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: native
      CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/opt/ai-commerce/config-repo
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      JAVA_OPTS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -Dfile.encoding=UTF-8
    volumes:
      - ../../config-repo:/opt/ai-commerce/config-repo:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - backend

  admin-web:
    build:
      context: ../..
      dockerfile: docker/app/Dockerfile.runtime
      args:
        APP_JAR_FILE: docker/app/dist/admin-web.jar
    image: ${ADMIN_WEB_IMAGE:-ai-commerce/admin-web:prod}
    container_name: ai-commerce-admin-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_CONFIG_ENABLED: "true"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USERNAME}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      SPRING_CLOUD_CONFIG_PROFILE: ${SPRING_CLOUD_CONFIG_PROFILE}
      SPRING_CLOUD_CONFIG_LABEL: ${SPRING_CLOUD_CONFIG_LABEL}
      SPRING_CLOUD_CONFIG_FAIL_FAST: ${SPRING_CLOUD_CONFIG_FAIL_FAST}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER_CLASS_NAME: ${DB_DRIVER_CLASS_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      JAVA_OPTS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -Dfile.encoding=UTF-8
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - backend

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
