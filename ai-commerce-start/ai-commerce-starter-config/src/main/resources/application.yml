# 配置中心配置
spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/xu-zeyu/affections-config.git
          search-paths: config-repo
          username: ${GIT_USERNAME}
          password: ${GIT_PASSWORD}
          default-label: main
  security:
    user:
      name: config-server
      password: config-server-password

# 服务器配置
server:
  port: 8888

#  actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always