# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:333306/jinHan_gold?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: oss-cn-heyuan.aliyuncs.com
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: bdj-mall-img
    region: cn-heyuan

# 日志配置
logging:
  level:
    root: info
    com.jinHan.gold: debug

todo:
  biz-event:
    mode: local
    rabbit:
      exchange: todo.biz.event.exchange
      queue: todo.biz.event.queue
      routing-key: todo.biz.event
