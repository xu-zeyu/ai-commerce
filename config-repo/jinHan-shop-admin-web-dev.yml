spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:333306}/${DB_NAME:jinhan_shop}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

logging:
  level:
    root: info
    com.jinHan.shop: debug

todo:
  biz-event:
    mode: local
    rabbit:
      exchange: todo.biz.event.exchange
      queue: todo.biz.event.queue
      routing-key: todo.biz.event
